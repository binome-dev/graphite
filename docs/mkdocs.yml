theme:
  features:
    #- navigation.tabs
    - navigation.top
    - navigation.sections
    #- content.action.edit
    #- content.action.view
    - content.code.annotate
    - content.code.copy
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: static/GRAPHITE_Logotype.png
  favicon: static/GRAPHITE_Favico_Dark.png
  font:
    text: Inter
    code: Fira Code
repo_name: binome-dev/graphite
repo_url: https://github.com/binome-dev/graphite
nav:
  - Home: index.md
  - Features: getting-started/features.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Core Concepts:
    - Arhitecture Overview: user-guide/architecture.md
    - Builder Pattern: user-guide/builder-pattern.md
    - Containers: user-guide/containers.md
    - Invoke Decorators: user-guide/invoke-decorators.md
    - Assistant: user-guide/assistant.md
    - Event Driven Workflow: user-guide/event-driven-workflow.md
    - Node: user-guide/node.md
    - Command: user-guide/command.md
    - Events:
      - Events : user-guide/events/events.md
      - Event Graph: user-guide/events/event_graph.md
      - Event Store: user-guide/events/event_store.md
    - Tools:
      - Tools Core: user-guide/tools/tool.md
      - Function: user-guide/tools/function.md
      - LLM: user-guide/tools/llm.md
      - OpenAI: user-guide/tools/openai.md
      - Ollama: user-guide/tools/ollama.md
      - Function Calls: user-guide/tools/function-call.md
    - Models: user-guide/models.md
    - Topics: 
        - Topics: user-guide/topics/topic.md
        - Topic Base: user-guide/topics/topic_base.md
        - Topic Output: user-guide/topics/output_topics.md
        - Subscription Expression: user-guide/topics/subscription_expression.md
    - Conventional Rules: user-guide/conventional-rules.md

site_name: Graphite Documentation

markdown_extensions:
  - codehilite:
      linenums: false
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - stylesheets/custom.css

plugins:
  - search
  - git-revision-date-localized

# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
